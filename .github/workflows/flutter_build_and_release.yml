name: Flutter Build, Release & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  android-release-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣  Source
      - name: 📥 Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2️⃣  Flutter SDK (with built-in cache flag)
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          cache: true

      # 3️⃣  Ruby & Fastlane
      - name: 💎 Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # 4️⃣  Parse version from tag
      - name: 🔢 Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip 'v' prefix: v1.0.0+73 -> 1.0.0+73
          VERSION="${TAG#v}"
          VERSION_PREFIX=$(echo "$VERSION" | cut -d '+' -f 1)
          VERSION_CODE=$(echo "$VERSION" | cut -d '+' -f 2)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_prefix=$VERSION_PREFIX" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      # 5️⃣  Cache Pub + Gradle to speed up CI
      - name: 🧹 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}

      - name: 📦 Get Flutter dependencies
        run: flutter pub get

      - name: 🔨 Run build runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔐 Decode Keystore
        env:
          PLAY_STORE_UPLOAD_KEY: ${{ secrets.PLAY_STORE_UPLOAD_KEY }}
        run: |
          echo "$PLAY_STORE_UPLOAD_KEY" | base64 --decode > android/app/upload-keystore.jks

      - name: 🔐 Decode Play Store Service Account JSON
        env:
          PLAY_STORE_CONFIG_JSON: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
        run: |
          echo "$PLAY_STORE_CONFIG_JSON" | base64 --decode > /tmp/play-store-key.json

      # 6️⃣  Build release APK
      - name: 🏗️ Build Android release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: flutter build apk --release

      # 7️⃣  Build release AAB
      - name: 🏗️ Build Android App Bundle
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: flutter build appbundle --release

      # 8️⃣  Extract changelog from CHANGELOG.md
      - name: 📝 Extract changelog for current version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"

          # Extract the section between current version header and next version header
          NOTES=$(awk "/^## \\[${VERSION//./\\.}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)

          # Trim leading/trailing blank lines
          NOTES=$(echo "$NOTES" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements."
          fi

          # Save for GitHub Release body
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Create Fastlane changelog files for each locale
          for locale_dir in fastlane/metadata/android/*/; do
            changelog_dir="${locale_dir}changelogs"
            mkdir -p "$changelog_dir"
            # Use locale-specific default.txt if it exists, otherwise use CHANGELOG.md notes
            if [ -f "${changelog_dir}/default.txt" ]; then
              cp "${changelog_dir}/default.txt" "${changelog_dir}/${VERSION_CODE}.txt"
            else
              echo "$NOTES" > "${changelog_dir}/${VERSION_CODE}.txt"
            fi
          done

      # 9️⃣  Deploy to Google Play Store
      - name: 🚀 Deploy to Play Store (Production)
        env:
          PLAY_STORE_CONFIG_JSON_PATH: /tmp/play-store-key.json
        run: bundle exec fastlane android deploy_production

      # 🔟  Create GitHub Release & Upload APK
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
